<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>BuildAI — Build Websites with AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:#07080f;color:#e2e8f0;-webkit-font-smoothing:antialiased;overflow:hidden}
button,input,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e2740;border-radius:99px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes bgPulse{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.06) translate(1.5%,1.5%)}}
@keyframes gradFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes dotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* PAGES */
.page{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .2s}
.page.off{opacity:0;pointer-events:none;z-index:0}
.page.on{opacity:1;pointer-events:all;z-index:1}

/* ═══════════ HOME PAGE ═══════════ */
#pg-home{overflow-y:auto;overflow-x:hidden;background:#07080f}

.hn{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;background:rgba(7,8,15,.92);backdrop-filter:blur(20px);z-index:100;flex-shrink:0}
.hn-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.hn-m{width:30px;height:30px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.hn-name{font-weight:800;font-size:16px;letter-spacing:-.4px}
.hn-badge{padding:2px 8px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:999px;font-size:10px;color:#a78bfa;font-weight:700}
.hn-links{display:flex;gap:24px}
.hn-link{font-size:13.5px;color:#64748b;cursor:pointer;transition:color .2s}
.hn-link:hover{color:#e2e8f0}
.hn-btns{display:flex;gap:8px}
.btn-ghost{padding:8px 18px;background:transparent;border:1px solid #1e2740;border-radius:9px;color:#94a3b8;font-size:13px;cursor:pointer;font-weight:500;transition:all .2s}
.btn-ghost:hover{border-color:#6366f1;color:#e2e8f0}
.btn-indigo{padding:9px 20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn-indigo:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.4)}

.hero{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:90px 24px 80px;min-height:calc(100vh - 60px);overflow:hidden}
.hero-bg{position:absolute;inset:-20%;background:radial-gradient(ellipse at 20% 25%,rgba(99,102,241,.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.14) 0%,transparent 50%),radial-gradient(ellipse at 50% 85%,rgba(236,72,153,.09) 0%,transparent 50%);animation:bgPulse 18s ease-in-out infinite;pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;mask-image:radial-gradient(ellipse at center,black 25%,transparent 72%)}
.hero-body{position:relative;z-index:1;max-width:740px;width:100%}
.hero-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 14px 5px 8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:999px;font-size:12px;color:#a78bfa;margin-bottom:28px;animation:fadeUp .5s ease both}
.hero-pill-dot{padding:2px 8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:999px;color:#fff;font-size:10px;font-weight:700}
.hero-h1{font-size:clamp(36px,6vw,80px);font-weight:900;line-height:1.02;letter-spacing:-3px;margin-bottom:22px;animation:fadeUp .6s ease both}
.hero-plain{color:#f1f5f9}
.hero-grad{background:linear-gradient(135deg,#6366f1,#a78bfa,#ec4899);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradFlow 5s ease infinite}
.hero-sub{font-size:17px;color:#475569;max-width:520px;margin:0 auto 44px;line-height:1.8;animation:fadeUp .7s ease both}

.prompt-wrap{max-width:660px;margin:0 auto;animation:fadeUp .8s ease both}
.prompt-box{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:6px 6px 6px 20px;margin-bottom:16px;backdrop-filter:blur(20px);box-shadow:0 24px 60px rgba(0,0,0,.4);transition:border-color .2s,box-shadow .2s}
.prompt-box:focus-within{border-color:rgba(99,102,241,.4);box-shadow:0 0 0 3px rgba(99,102,241,.08),0 24px 60px rgba(0,0,0,.4)}
.prompt-inp{flex:1;background:transparent;border:none;outline:none;color:#e2e8f0;font-size:15px;padding:13px 0}
.prompt-inp::placeholder{color:#334155}
.prompt-go{padding:12px 24px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:transform .15s,box-shadow .15s}
.prompt-go:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.prompt-go:disabled{background:#1e2740;color:#334155;cursor:not-allowed;transform:none;box-shadow:none}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{padding:7px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:999px;font-size:12px;color:#64748b;cursor:pointer;transition:all .2s}
.chip:hover{border-color:rgba(99,102,241,.35);color:#94a3b8;background:rgba(99,102,241,.06)}
.social-proof{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:38px;flex-wrap:wrap;animation:fadeUp .9s ease both}
.av-stack{display:flex}
.av{width:30px;height:30px;border-radius:50%;border:2px solid #07080f;margin-left:-8px;font-size:13px;display:flex;align-items:center;justify-content:center}
.av:first-child{margin-left:0}
.proof{font-size:12.5px;color:#334155}
.proof strong{color:#64748b}
.proof-div{width:1px;height:14px;background:#1e2740}
.stars{color:#f59e0b;letter-spacing:1px}

.feat-sec{padding:80px 24px;max-width:1000px;margin:0 auto;width:100%}
.sec-label{font-size:11px;font-weight:700;color:#6366f1;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:12px}
.sec-title{font-size:clamp(24px,4vw,36px);font-weight:900;text-align:center;letter-spacing:-1px;margin-bottom:10px}
.sec-sub{font-size:14px;color:#475569;text-align:center;margin-bottom:44px;max-width:460px;margin-left:auto;margin-right:auto}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:16px}
.feat-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:22px;transition:border-color .25s,transform .25s}
.feat-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-3px)}
.feat-ic{font-size:24px;margin-bottom:13px}
.feat-t{font-size:14px;font-weight:700;color:#c4d4f0;margin-bottom:7px}
.feat-d{font-size:12px;color:#475569;line-height:1.7}

.how-sec{padding:0 24px 80px;max-width:820px;margin:0 auto;width:100%}
.steps-row{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.step-box{padding:11px 15px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;min-width:92px;text-align:center}
.step-n{font-size:9px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.step-l{font-size:12px;font-weight:600;color:#94a3b8}
.step-arr{color:#1e2740;font-size:18px}

.cta-sec{padding:72px 24px 90px;text-align:center;border-top:1px solid rgba(255,255,255,.04)}
.cta-h{font-size:clamp(26px,4vw,38px);font-weight:900;letter-spacing:-1.2px;margin-bottom:12px}
.cta-p{font-size:15px;color:#475569;margin-bottom:30px}
.cta-btn{padding:15px 42px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 10px 40px rgba(99,102,241,.35);letter-spacing:-.3px;transition:transform .2s,box-shadow .2s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 16px 50px rgba(99,102,241,.45)}

/* ═══════════ BUILDER PAGE ═══════════ */
#pg-builder{background:#07080f}

/* TOP BAR */
.tb{height:42px;display:flex;align-items:center;padding:0 8px;border-bottom:1px solid #0f1220;background:#0b0d17;flex-shrink:0;gap:3px;z-index:200;overflow:visible}
.tb-left{display:flex;align-items:center;gap:3px;flex-shrink:0}
.tb-logo{display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 7px;border-radius:7px;transition:background .15s}
.tb-logo:hover{background:#13172a}
.tb-lm{width:18px;height:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.tb-ln{font-size:12px;font-weight:800;letter-spacing:-.3px}
.tb-proj{display:flex;align-items:center;gap:5px;padding:4px 8px;background:#13172a;border:1px solid #1a1f33;border-radius:7px;cursor:pointer;max-width:130px;flex-shrink:0}
.tb-pn{font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-pc{font-size:8px;color:#334155;flex-shrink:0}
.tb-sep{width:1px;height:22px;background:#0f1220;margin:0 2px;flex-shrink:0}
.tb-ic{width:27px;height:27px;background:transparent;border:none;border-radius:6px;color:#334155;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:background .15s,color .15s}
.tb-ic:hover{background:#13172a;color:#64748b}
.tb-center{flex:1;display:flex;align-items:center;justify-content:center;gap:2px;min-width:0}
.tab-b{padding:5px 11px;background:transparent;border:1px solid transparent;border-radius:7px;color:#334155;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-b.on{background:#13172a;border-color:#1e2740;color:#c4d4f0;font-weight:600}
.tab-b:hover:not(.on){color:#64748b}
.tb-url{display:flex;align-items:center;gap:5px;padding:4px 10px;background:#0f1220;border:1px solid #13172a;border-radius:7px;margin-left:6px;max-width:190px;overflow:hidden}
.tb-url-t{font-size:10px;color:#334155;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-right{display:flex;align-items:center;gap:3px;flex-shrink:0}
.vp-grp{display:flex;gap:1px;background:#0f1220;border:1px solid #13172a;border-radius:7px;padding:2px;flex-shrink:0}
.vp-b{width:24px;height:22px;background:transparent;border:none;border-radius:5px;cursor:pointer;font-size:10px;transition:background .15s;display:flex;align-items:center;justify-content:center}
.vp-b.on{background:#1e2740}
.tb-tool{padding:4px 9px;background:#13172a;border:1px solid #1a1f33;border-radius:7px;color:#64748b;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0;transition:all .15s}
.tb-tool:hover{border-color:#2e3a55;color:#94a3b8}
.tb-tool.grn{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);color:#34d399}
.tb-share{padding:4px 10px;background:#13172a;border:1px solid #1a1f33;border-radius:7px;color:#64748b;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.tb-share:hover{border-color:#2e3a55;color:#94a3b8}
.tb-upgrade{padding:4px 10px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25);border-radius:7px;color:#a78bfa;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tb-pub{padding:5px 12px;background:linear-gradient(135deg,#059669,#10b981);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tb-pub:disabled{opacity:.4;cursor:default}
.tb-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.tb-signin{padding:5px 12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* MOBILE TAB BAR */
.mob-tabs{display:none;height:44px;background:#0b0d17;border-bottom:1px solid #0f1220;flex-shrink:0}
.mob-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;background:transparent;border:none;border-bottom:2px solid transparent;color:#334155;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.mob-tab.on{color:#c4d4f0;border-bottom-color:#6366f1}

/* BUILDER BODY */
.b-body{flex:1;display:flex;overflow:hidden;min-height:0;position:relative}

/* SIDEBAR */
.sb{width:185px;flex-shrink:0;display:flex;flex-direction:column;background:#0b0d17;border-right:1px solid #0f1220;overflow:hidden}
.sb-hd{padding:8px 10px;border-bottom:1px solid #0f1220;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-lbl{font-size:10px;font-weight:700;color:#1e2740;text-transform:uppercase;letter-spacing:1.2px}
.sb-tog{background:none;border:none;color:#1e2740;cursor:pointer;font-size:13px;transition:color .15s}
.sb-tog:hover{color:#334155}
.sb-new{width:calc(100% - 14px);margin:7px;padding:8px;background:#0f1220;border:1px dashed #1a1f33;border-radius:8px;color:#334155;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.sb-new:hover{border-color:#6366f1;color:#6366f1}
.sb-list{flex:1;overflow-y:auto;padding:0 7px 8px}
.sb-sec{font-size:9.5px;font-weight:700;color:#131828;text-transform:uppercase;letter-spacing:1.2px;padding:6px 8px 4px}
.sb-empty{padding:20px 10px;text-align:center;font-size:11px;color:#131828;line-height:1.8}
.pi{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:8px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .15s}
.pi:hover{background:#0f1220}
.pi.on{background:#111e36;border-color:#1e3a5f}
.pi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pi-n{font-size:11.5px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi.on .pi-n{color:#c4d4f0;font-weight:500}
.pi-d{font-size:9.5px;color:#131828;margin-top:1px}
.sb-ft{padding:8px;border-top:1px solid #0f1220;flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#0f1220;border-radius:8px;cursor:pointer}
.sb-uav{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-up{font-size:9.5px;color:#1e2740}
.sb-open-btn{position:absolute;left:0;z-index:50;background:#0f1220;border:1px solid #1a1f33;border-top-right-radius:7px;border-bottom-right-radius:7px;color:#334155;cursor:pointer;padding:8px 5px;font-size:11px;top:50%;transform:translateY(-50%);transition:color .15s}

/* CHAT PANEL */
.cp{width:286px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #0f1220;background:#0b0d17;overflow:hidden}
.c-stat{padding:6px 12px;border-bottom:1px solid #0f1220;display:flex;align-items:center;gap:6px;background:#09091a;flex-shrink:0}
.r-dots{display:flex;gap:3px}
.r-dot{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;border:1px solid #1e2740;color:#1e2740;transition:all .35s;flex-shrink:0}
.r-dot.act{border-color:#8b5cf6;background:rgba(139,92,246,.2);color:#c4b5fd}
.r-dot.dn{border-color:#6366f1;background:#6366f1;color:#fff}
.c-stat-t{flex:1;font-size:10px;color:#1e2740;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.c-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:24px 14px}
.c-e-ic{font-size:34px;animation:floatY 3s ease-in-out infinite}
.c-e-t{font-size:13px;font-weight:600;color:#334155}
.c-e-s{font-size:11px;color:#131828;line-height:1.75;max-width:190px}
.q-prompts{display:flex;flex-direction:column;gap:5px;width:100%;margin-top:6px}
.q-p{padding:8px 11px;background:#0f1220;border:1px solid #13172a;border-radius:8px;color:#334155;font-size:11px;cursor:pointer;text-align:left;transition:all .2s}
.q-p:hover{border-color:rgba(99,102,241,.3);color:#6366f1}
.m-u{display:flex;justify-content:flex-end;animation:fadeIn .2s}
.m-u-b{max-width:90%;background:linear-gradient(135deg,#4f46e5,#6d28d9);border-radius:13px 13px 3px 13px;padding:10px 13px;font-size:12px;line-height:1.65;color:#e2e8f0;word-break:break-word}
.m-a{animation:fadeIn .2s}
.m-a-lbl{font-size:9px;font-weight:700;color:#131828;letter-spacing:1.5px;margin-bottom:5px}
.m-think{background:#0f1220;border:1px solid #13172a;border-radius:3px 12px 12px 12px;padding:12px 14px;margin-bottom:8px}
.think-hd{font-size:10px;color:#6366f1;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.think-dot{width:6px;height:6px;border-radius:50%;background:#6366f1;animation:blink 1.5s ease infinite;flex-shrink:0}
.think-ln{font-size:11.5px;color:#334155;line-height:1.8}
.think-ln.ap{color:#475569;font-weight:600;margin-top:5px}
.think-ln.bl{color:#2e3a55;padding-left:4px}
.typing{display:flex;gap:4px;padding:10px 14px;background:#0f1220;border:1px solid #13172a;border-radius:3px 12px 12px 12px;width:fit-content;margin-top:8px}
.td{width:5px;height:5px;border-radius:50%;background:#1e2740}
.td:nth-child(1){animation:dotBounce .9s 0s ease-in-out infinite}
.td:nth-child(2){animation:dotBounce .9s .15s ease-in-out infinite}
.td:nth-child(3){animation:dotBounce .9s .3s ease-in-out infinite}
.m-card{background:#0f1220;border:1px solid #13172a;border-radius:10px;margin-bottom:8px;overflow:hidden}
.m-card-h{padding:10px 13px;border-bottom:1px solid #13172a;font-size:12px;font-weight:500;color:#64748b}
.m-card-tabs{display:flex;border-bottom:1px solid #13172a}
.m-card-tb{flex:1;padding:7px;background:transparent;border:none;color:#334155;font-size:11px;cursor:pointer;transition:all .15s}
.m-card-tb.on{background:#0d1428;color:#818cf8;font-weight:600}
.m-txt{font-size:12px;color:#64748b;line-height:1.75;margin-bottom:8px}
.m-next-t{font-size:11px;font-weight:600;color:#334155;margin-bottom:6px}
